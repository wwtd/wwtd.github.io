# NexT Theme Configuration
# Docs: https://theme-next.js.org/docs/

# Scheme Settings
scheme: Gemini

# Menu Settings
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th

# Sidebar Settings
sidebar:
  position: left
  display: post

# Post Settings
post_meta:
  item_text: true
  created_at: true
  updated_at: true
  categories: true

# Code Highlight
codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  copy_button:
    enable: true
    show_result: true

# Local Search
local_search:
  enable: true

# Footer Settings
footer:
  since: 2025
